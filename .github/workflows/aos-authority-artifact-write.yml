# Publishes public authority artifacts by PR under a signed authority-artifact-write grant.
# The workflow signs artifacts keylessly with GitHub OIDC and records the sigstore bundle beside the artifact.
# The agent never receives signing keys or raw credentials. root-authority mints or renews the standing grant;
# routine artifact publication uses the signed grant reference, semantic verifier, and provider auto-merge.

name: aos-authority-artifact-write
on:
  workflow_dispatch:
    inputs:
      artifact_kind:
        description: "root-doctrine, grant, or lane"
        required: true
      source_ref:
        description: "Branch, tag, or commit containing the candidate artifact"
        required: true
      source_path:
        description: "Path to the candidate JSON artifact at source_ref"
        required: true
      target_path:
        description: "Authority repo target path: root-doctrine.json, grants/*.json, or lanes/*.json"
        required: true
      grant_ref:
        description: "Protected-ref path to the signed authority-artifact-write grant authorizing this publication"
        required: true
      provider_record:
        description: "GitHub provider record URL proving request, dry-run, and recovery plan"
        required: true

permissions:
  actions: write
  contents: write
  id-token: write
  pull-requests: write
  statuses: write

jobs:
  publish-authority-artifact:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout candidate artifact
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref }}
          path: candidate
          fetch-depth: 0

      - name: Validate target and artifact class
        shell: bash
        run: |
          set -euo pipefail
          case "${{ inputs.artifact_kind }}:${{ inputs.target_path }}" in
            root-doctrine:root-doctrine.json) ;;
            grant:grants/*.json) ;;
            lane:lanes/*.json) ;;
            *) echo "target_path is not valid for artifact_kind" >&2; exit 1 ;;
          esac
          test -f "candidate/${{ inputs.source_path }}"
          jq -e . "candidate/${{ inputs.source_path }}" >/dev/null

      - name: Public redaction preflight
        shell: bash
        run: |
          set -euo pipefail
          artifact="candidate/${{ inputs.source_path }}"
          ARTIFACT="$artifact" node <<'NODE'
          const fs = require('node:fs');
          const artifact = process.env.ARTIFACT;
          const payload = JSON.parse(fs.readFileSync(artifact, 'utf8'));
          const deny = [
            /gh[pousr]_[A-Za-z0-9_]{20,}/,
            /github_pat_[A-Za-z0-9_]+/,
            /-----BEGIN .*PRIVATE KEY-----/,
            /AKIA[0-9A-Z]{16}/,
            /password\s*[:=]/i,
            /secret\s*[:=]/i,
            /(?<!id-)token\s*[:=]/i
          ];
          const findings = [];
          function walk(value, path = []) {
            if (path.join('.') === 'redaction.denyPatterns') return;
            if (Array.isArray(value)) {
              value.forEach((item, index) => walk(item, path.concat(String(index))));
              return;
            }
            if (value && typeof value === 'object') {
              Object.entries(value).forEach(([key, item]) => walk(item, path.concat(key)));
              return;
            }
            if (typeof value !== 'string') return;
            for (const pattern of deny) {
              if (pattern.test(value)) findings.push(`${path.join('.')}: denied private-material pattern`);
            }
          }
          walk(payload);
          if (findings.length > 0) {
            console.error(findings.join('\n'));
            process.exit(1);
          }
          NODE

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Keyless sign artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p signed
          cp "candidate/${{ inputs.source_path }}" signed/artifact.json
          cosign sign-blob --yes signed/artifact.json --bundle signed/artifact.sigstore.json

      - name: Checkout authority ref
        uses: actions/checkout@v4
        with:
          ref: main
          path: authority
          fetch-depth: 0

      - name: Publish signed artifact branch
        shell: bash
        working-directory: authority
        run: |
          set -euo pipefail
          branch="aos/authority-artifacts/${{ inputs.artifact_kind }}-${{ github.run_id }}"
          git checkout -B "$branch"
          target="${{ inputs.target_path }}"
          grant_ref="${{ inputs.grant_ref }}"
          case "$grant_ref" in
            grants/*.json) ;;
            *) echo "grant_ref must point to grants/*.json" >&2; exit 1 ;;
          esac
          grant_bundle="${grant_ref%.json}.sigstore.json"
          test -f "$grant_ref"
          test -f "$grant_bundle"
          mkdir -p "$(dirname "$target")"
          cp ../signed/artifact.json "$target"
          cp ../signed/artifact.sigstore.json "$target.sigstore.json"
          {
            echo "providerRecord=${{ inputs.provider_record }}"
            echo "workflowRun=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "sourceRef=${{ inputs.source_ref }}"
            echo "sourcePath=${{ inputs.source_path }}"
            echo "grantRef=${{ inputs.grant_ref }}"
          } > "$target.receipt"
          git config user.name "aos-authority-artifact-write"
          git config user.email "aos-authority-artifact-write@users.noreply.github.com"
          git add "${{ inputs.target_path }}" "${{ inputs.target_path }}.sigstore.json" "${{ inputs.target_path }}.receipt"
          git commit -m "publish authority artifact ${{ inputs.target_path }}"
          artifact_sha="$(git rev-parse HEAD)"
          git push origin HEAD:refs/heads/aos/authority-artifacts/${{ inputs.artifact_kind }}-${{ github.run_id }}
          echo "artifact_branch=$branch" >> "$GITHUB_ENV"
          echo "artifact_sha=$artifact_sha" >> "$GITHUB_ENV"

      - name: Open artifact PR and enable auto-merge
        shell: bash
        working-directory: authority
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          cat > pr-body.md <<'BODY'
          Provider record: ${{ inputs.provider_record }}

          Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          Source: ${{ inputs.source_ref }}:${{ inputs.source_path }}
          Grant: ${{ inputs.grant_ref }}

          This PR was generated by the standing-grant artifact writer. root-authority approval belongs to grant issuance, not this routine publication. The artifact and sigstore bundle are committed together.
          BODY
          pr_url="$(gh pr create \
            --base main \
            --head "$artifact_branch" \
            --title "Publish authority artifact ${{ inputs.target_path }}" \
            --body-file pr-body.md)"
          gh api \
            --method POST \
            "repos/${{ github.repository }}/actions/workflows/aos-semantic-verifiers.yml/dispatches" \
            --input - <<EOF
          {"ref": "$artifact_branch"}
          EOF
          verifier_url=""
          conclusion=""
          for attempt in {1..30}; do
            checks="$(gh api "repos/${{ github.repository }}/commits/$artifact_sha/check-runs?check_name=aos-semantic-verifiers")"
            status="$(jq -r '.check_runs[0].status // ""' <<<"$checks")"
            conclusion="$(jq -r '.check_runs[0].conclusion // ""' <<<"$checks")"
            verifier_url="$(jq -r '.check_runs[0].html_url // ""' <<<"$checks")"
            if [ "$status" = "completed" ] && [ "$conclusion" = "success" ]; then
              break
            fi
            if [ "$status" = "completed" ] && [ "$conclusion" != "success" ]; then
              echo "semantic verifier concluded $conclusion" >&2
              exit 1
            fi
            sleep 5
          done
          if [ "$conclusion" != "success" ]; then
            echo "semantic verifier did not finish successfully" >&2
            exit 1
          fi
          gh api \
            --method POST \
            "repos/${{ github.repository }}/statuses/$artifact_sha" \
            -f state=success \
            -f context=aos-semantic-verifiers \
            -f target_url="$verifier_url" \
            -f description="authority semantic verifier passed"
          gh pr merge --auto --merge "$pr_url"
