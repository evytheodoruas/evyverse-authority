# Authority repo verifier. Phase 0 keeps this intentionally small and dependency-free:
# - public redaction scan
# - all JSON parses
# - root doctrine shape exists
# - only the signed-grant artifact writer and root-approved grant issuer may have contents:write
# - routine artifact writes publish by branch PR + auto-merge, not root-authority approval or direct push

name: aos-semantic-verifiers
on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  aos-semantic-verifiers:
    name: aos-semantic-verifiers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Authority semantic verifier
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');

          const failures = [];
          const deny = [
            /gh[pousr]_[A-Za-z0-9_]{20,}/,
            /github_pat_[A-Za-z0-9_]+/,
            /-----BEGIN .*PRIVATE KEY-----/,
            /AKIA[0-9A-Z]{16}/,
            /password\s*[:=]/i,
            /secret\s*[:=]/i,
            /(?<!id-)token\s*[:=]/i
          ];

          function walk(dir) {
            if (!fs.existsSync(dir)) return [];
            return fs.readdirSync(dir, { withFileTypes: true }).flatMap((entry) => {
              const full = path.join(dir, entry.name);
              if (entry.isDirectory()) return walk(full);
              return [full];
            });
          }

          function isPolicyPatternLine(file, line) {
            const base = path.basename(file);
            const trimmed = line.trim();
            if (base === 'aos-authority-artifact-write.yml' && trimmed.startsWith('if grep -E -i ')) return true;
            if (base === 'aos-grant-issuance.yml' && trimmed.startsWith('if grep -E -i ')) return true;
            if (['aos-authority-artifact-write.yml', 'aos-grant-issuance.yml'].includes(base) && /^GH_TOKEN:\s*\$\{\{\s*github\.token\s*\}\}$/.test(trimmed)) return true;
            if (base === 'aos-semantic-verifiers.yml' && trimmed.includes('GH_TOKEN:') && (trimmed.includes('github\\.token') || trimmed.includes('github\\\\.token'))) return true;
            if (['aos-semantic-verifiers.yml', 'aos-authority-artifact-write.yml'].includes(base) && /^\/.*\/[i]?,?$/.test(trimmed)) return true;
            if (file.startsWith('lanes' + path.sep) && /(\[A-Za-z|\\s\*|BEGIN \.\*PRIVATE KEY|\[0-9A-Z\])/.test(trimmed)) return true;
            return false;
          }

          for (const file of walk('.').filter((name) => !name.startsWith('.git' + path.sep))) {
            let text = '';
            try {
              text = fs.readFileSync(file, 'utf8');
            } catch {
              continue;
            }
            for (const [index, line] of text.split(/\r?\n/).entries()) {
              for (const pattern of deny) {
                if (pattern.test(line) && !isPolicyPatternLine(file, line)) {
                  failures.push(`${file}:${index + 1}: denied private-material pattern`);
                }
              }
            }
            if (file.endsWith('.json')) {
              try {
                JSON.parse(text);
              } catch (error) {
                failures.push(`${file}: invalid JSON: ${error.message}`);
              }
            }
          }

          const rootDoctrine = JSON.parse(fs.readFileSync('root-doctrine.json', 'utf8'));
          if (rootDoctrine.schema !== 'agent_os.root_doctrine.v1') {
            failures.push('root-doctrine.json: schema must be agent_os.root_doctrine.v1');
          }

          const workflows = walk('.github/workflows').filter((file) => /\.ya?ml$/.test(file));
          const contentsWriteAllowed = new Set(['aos-authority-artifact-write.yml', 'aos-grant-issuance.yml']);
          for (const file of workflows) {
            const text = fs.readFileSync(file, 'utf8');
            if (/^\s*contents:\s*write\s*$/m.test(text) && !contentsWriteAllowed.has(path.basename(file))) {
              failures.push(`${file}: only authority artifact/grant workflows may request contents: write`);
            }
          }

          const writer = '.github/workflows/aos-authority-artifact-write.yml';
          if (fs.existsSync(writer)) {
            const text = fs.readFileSync(writer, 'utf8');
            if (/^\s*environment:\s*root-authority\s*$/m.test(text)) failures.push(`${writer}: routine writer must not require root-authority`);
            if (!/grant_ref:/.test(text)) failures.push(`${writer}: missing signed grant_ref input`);
            if (!/id-token:\s*write/.test(text)) failures.push(`${writer}: missing OIDC id-token permission`);
            if (!/cosign sign-blob/.test(text)) failures.push(`${writer}: missing keyless signing step`);
            if (!/actions:\s*write/.test(text)) failures.push(`${writer}: missing explicit verifier dispatch permission`);
            if (!/pull-requests:\s*write/.test(text)) failures.push(`${writer}: missing branch PR publication permission`);
            if (!/statuses:\s*write/.test(text)) failures.push(`${writer}: missing status publication permission`);
            if (!/gh pr create/.test(text)) failures.push(`${writer}: missing branch PR publication`);
            if (!/gh pr merge --auto/.test(text)) failures.push(`${writer}: missing auto-merge request`);
            if (!/actions\/workflows\/aos-semantic-verifiers\.yml\/dispatches/.test(text)) failures.push(`${writer}: missing explicit verifier dispatch for artifact PR branch`);
            if (!/ref":\s*"\$artifact_branch"/.test(text)) failures.push(`${writer}: verifier dispatch must target artifact branch`);
            if (!/artifact_sha="\$\(git rev-parse HEAD\)"/.test(text)) failures.push(`${writer}: missing artifact head sha capture`);
            if (!/check-runs\?check_name=aos-semantic-verifiers/.test(text)) failures.push(`${writer}: missing dispatched verifier polling`);
            if (!/statuses\/\$artifact_sha/.test(text)) failures.push(`${writer}: missing provider status publication for required check context`);
            if (!/context=aos-semantic-verifiers/.test(text)) failures.push(`${writer}: missing required status context`);
            if (!/git push origin HEAD:refs\/heads\/aos\/authority-artifacts\//.test(text)) failures.push(`${writer}: missing authority artifact branch push`);
            if (/git push origin HEAD:main/.test(text)) failures.push(`${writer}: forbidden direct main push`);
          }

          const grantIssuer = '.github/workflows/aos-grant-issuance.yml';
          if (fs.existsSync(grantIssuer)) {
            const text = fs.readFileSync(grantIssuer, 'utf8');
            if (!/^\s*environment:\s*root-authority\s*$/m.test(text)) failures.push(`${grantIssuer}: grant issuance must require root-authority`);
            if (!/id-token:\s*write/.test(text)) failures.push(`${grantIssuer}: missing OIDC id-token permission`);
            if (!/pull-requests:\s*write/.test(text)) failures.push(`${grantIssuer}: missing grant PR publication permission`);
            if (!/cosign sign-blob/.test(text)) failures.push(`${grantIssuer}: missing keyless grant signing step`);
            if (!/gh pr create/.test(text)) failures.push(`${grantIssuer}: grant issuance must publish by branch PR`);
            if (!/gh pr merge --auto/.test(text)) failures.push(`${grantIssuer}: missing grant auto-merge request`);
            if (!/git push origin HEAD:refs\/heads\/aos\/grants\//.test(text)) failures.push(`${grantIssuer}: missing grant branch push`);
            if (/git push(?! origin HEAD:refs\/heads\/aos\/grants\/)/.test(text)) failures.push(`${grantIssuer}: forbidden direct grant push`);
            if (/git commit -S/.test(text)) failures.push(`${grantIssuer}: forbidden signed commit requirement`);
          }

          if (failures.length > 0) {
            console.error(failures.join('\n'));
            process.exit(1);
          }
          console.log('authority semantic verifier passed');
          NODE
